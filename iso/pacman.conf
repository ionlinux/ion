#
# pacman.conf for Ion Linux ISO build
#

[options]
HoldPkg     = pacman glibc
Architecture = auto
SigLevel    = Required DatabaseOptional
LocalFileSigLevel = Optional

# Local repo for Ion-built packages (calamares, etc.)
[ion-local]
SigLevel = Optional TrustAll
Server = file:///tmp/ion-repo

# Use Arch Linux repos for bootstrapping until Ion repos are live
[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist
