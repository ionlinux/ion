---
modules-search: [ local ]

branding: ion

sequence:
  - show:
      - welcome
      - locale
      - keyboard
      - partition
      - netinstall
      - users
      - summary

  - exec:
      - partition
      - mount
      - unpackfs
      - fstab
      - locale
      - keyboard
      - localecfg
      - users
      - networkcfg
      - shellprocess
      - umount

  - show:
      - finished

prompt-install: true
dont-chroot: false
disable-cancel: false
disable-cancel-during-exec: false
quit-at-end: false
